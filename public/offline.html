<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Browser | Offline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background: #050505; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-center p-6">
    <div class="max-w-md w-full glass p-12 rounded-[3rem] text-center space-y-8 shadow-2xl">
        <div class="w-24 h-24 bg-red-600/20 rounded-[2rem] flex items-center justify-center mx-auto mb-4">
            <svg class="w-12 h-12 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M5.636 5.636a9 9 0 0112.728 0M5.636 5.636L3 3m2.636 2.636l2.829 2.829m-2.829-2.829L5.636 18.364a9 9 0 01-12.728 0m12.728 0L21 21m-2.636-2.636l-2.829 2.829"></path>
            </svg>
        </div>
        <div class="space-y-2">
            <h1 class="text-4xl font-black text-white tracking-tighter uppercase">Offline</h1>
            <p class="text-gray-500 text-lg font-medium">You're currently disconnected from the internet.</p>
        </div>
        <div class="pt-4">
            <button onclick="window.location.reload()" class="w-full py-4 bg-white/5 hover:bg-white/10 border border-white/10 rounded-2xl text-sm font-bold transition-all uppercase tracking-widest">Try Reconnect</button>
        </div>
        <div class="pt-2">
            <a href="/" class="text-blue-500 text-xs font-bold uppercase tracking-widest hover:underline">Back to Home</a>
        </div>
    </div>
</body>
</html>
